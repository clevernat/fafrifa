# Conda environment for the full sai_extremes workflow (production / Cloud Hub).
# The Reflective Cloud Hub already provides this stack; this file pins it for
# local reproduction. For the numpy-only kernels + tests, `pip install -e .`
# (core deps only) is sufficient.
name: sai-extremes
channels:
  - conda-forge
dependencies:
  - python>=3.10
  - numpy>=1.23
  - pandas>=1.5
  - pyyaml>=6.0
  - xarray>=2023.1
  - cftime>=1.6
  - netcdf4>=1.6
  - dask>=2023.1
  - s3fs>=2023.1
  - zarr>=2.14
  - fsspec>=2023.1
  - matplotlib>=3.6
  - cartopy>=0.21
  - nc-time-axis>=1.4
  - pytest>=7.0
  - jupyterlab
  # Optional cross-check of index definitions against the community standard:
  - xclim>=0.47
  - pip
  - pip:
      - -e .
